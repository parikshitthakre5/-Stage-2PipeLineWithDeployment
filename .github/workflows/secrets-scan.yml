name: Secrets Scan

on:
  workflow_call: 

jobs:
  secrets-scan:
    # server
    runs-on: ubuntu-latest

    steps:
      # get the latest code in that server
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}