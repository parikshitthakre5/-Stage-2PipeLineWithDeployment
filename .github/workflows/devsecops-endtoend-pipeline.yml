name: DevSecOps End-to-End Pipeline

on:
   push:
     branches:
       - main

jobs:
        
        code-quality:
            uses: ./.github/workflows/code-quality.yml

        secrets-scan:
            needs: code-quality
            uses: ./.github/workflows/secrets-scan.yml

        dependency-scan:
            needs: secrets-scan
            uses: ./.github/workflows/dependency-scan.yml

        docker-lint:
            needs: dependency-scan
            uses: ./.github/workflows/docker-lint.yml

        docker-build-push:
            needs: [docker-lint , code-quality, secrets-scan, dependency-scan , docker-lint]
            uses: ./.github/workflows/docker-build-push.yml
            secrets:
              DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
              DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }} 

        image-scan:
            needs: docker-build-push
            uses: ./.github/workflows/image-scan.yml
            secrets:
              DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
              DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
